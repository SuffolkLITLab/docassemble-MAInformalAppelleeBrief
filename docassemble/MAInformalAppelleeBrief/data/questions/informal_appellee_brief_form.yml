---
id: appendix
question: |
  How many volumes does your supplemental appendix have?
subquestion: |
#Provide some type of guidance for user on how to determine volume number
fields: 
  - "Total volumes": appendix_volume_total
continue button field: appendix
---
id: signature_fields
question: |
  Sign your name
subquestion: |
  By signing your name, you agree to
  our terms and conditions.
signature: signature_fields
under: |
  ${ users[0].signature }
---
id: preview appellee_brief
question: |
  Preview your form before you sign it
subquestion: |
  Here is a preview of the form you will sign on the next page.   
  
  ${ al_court_bundle.as_pdf(key='preview') }

  Click the image to open it in a new tab. 
  
  Click the "Edit answers" button
  to edit your answers.

  ${ action_button_html(url_action('review_appellee_brief'), label='Edit answers', color='info') }
  
  Remember to come back to this window to continue and sign your form.
continue button field: appellee_brief_preview_question    
---
code: |
  signature_fields = ['users[0].signature']
---
id: appellee brief review screen
event: review_appellee_brief
question: |
  Review and proofread your answers
review:
  - Edit: trial_court
    button: |
      **Trial court**
      
      % if defined("trial_court.name.first"):
      * name: ${ trial_court.name.full() }
      % endif
  - Edit: filed_date
    button: |
      **Write the date the case was filed in the lower court**:
      ${ filed_date }
  - Edit: decision_date
    button: |
      **What date did the lower court decide your case?**:
      ${ decision_date }
  - Edit: judge_name
    button: |
      **What was the name of the judge in the lower court?**:
      ${ judge_name }
  - Edit: docket_number
    button: |
      **Docket number**:
      ${ docket_number }
  - Edit: users.revisit
    button: |
      **Users**

      % for item in users:
        * ${ item }
      % endfor
  - Edit: other_parties.revisit
    button: |
      **Other parties**
      
      % for item in other_parties:
        * ${ item }
      % endfor
  - Edit: appeal_issues
    button: |
      **Issue(s) or claim(s) of error on appeal**:
      > ${ single_paragraph(appeal_issues) }
  - Edit: challenged_judgments
    button: |
      **Write the lower court decisions you want changed**:
      > ${ single_paragraph(challenged_judgments) }
  - Edit: appeal_facts
    button: |
      **Write all of the facts about your case**:
      > ${ single_paragraph(appeal_facts) }
  - Edit: appeal_arguments
    button: |
      **Write your argument**:
      > ${ single_paragraph(appeal_arguments) }
  - Edit: appeal_conclusion
    button: |
      **Write a summary of what you want from the court**:
      > ${ single_paragraph(appeal_conclusion) }
  - Edit: record_appendix_upload_question
    button: |
      **Documents from the trial court case attached?**
      
      % if record_appendix_upload_question:
      Yes
      % elif not record_appendix_upload_question:
      No
      % endif
  - note: |
      **Supporting exhibits**:
      
      % if record_appendix_document.exhibits.there_are_any:
      ${ record_appendix_document.exhibits.in_progress_exhibits }
      % else:
      You have not attached any exhibits yet
      % endif

      ${ record_appendix_document.exhibits.add_action() }
    css class: bg-secondary-subtle
    show if: record_appendix_upload_question

  - Edit: impounded_record_appendix
    button: |
      **Impounded documents attached?**

      % if impounded_record_appendix:
      Yes
      % else:
      No
      % endif

  - note: |
      **Impounded exhibits**:

      % if impounded_document.exhibits.there_are_any:
      ${ impounded_document.exhibits.in_progress_exhibits }
      % else:
      You have not attached any impounded exhibits yet
      % endif

      ${ impounded_document.exhibits.add_action() }
    css class: bg-secondary-subtle
    show if: impounded_record_appendix

  - Edit: filing_institution
    button: |
      **Filing and service method**

      % if filing_institution:
      You are incarcerated.
      % else:
      You are not incarcerated.
      % endif

      % if filing_mail:
      You will file/serve by mail.
      % endif

      % if filing_electronic:
      You will file/serve electronically.
      % endif
    
---
id: edit users
continue button field: users.revisit
question: |
  Edit users
subquestion: |
  ${ users.table }

  ${ users.add_action() }
---
table: users.table
rows: users
columns:
  - Signature: |
      row_item.signature if defined("row_item.signature") else ""
  - Address: |
      row_item.address.block() if defined("row_item.address") else ""
  - Signature date: |
      row_item.signature_date if defined("row_item.signature_date") else ""
  - Name: |
      row_item.name.full() if defined("row_item.name.first") else ""
  - Mobile number: |
      row_item.mobile_number if defined("row_item.mobile_number") else ""
  - Phone number: |
      row_item.phone_number if defined("row_item.phone_number") else ""
  - Email: |
      row_item.email if defined("row_item.email") else ""
edit:
  - signature
  - pronouns
  - address.address
  - signature_date
  - name.first
  - mobile_number
  - phone_number
  - email
confirm: True
---
id: edit other parties
continue button field: other_parties.revisit
question: |
  Edit other_parties
subquestion: |
  ${ other_parties.table }

  ${ other_parties.add_action() }
---
table: other_parties.table
rows: other_parties
columns:
  - Name: |
      row_item.name.full() if defined("row_item.name.first") else ""
  - Address: |
      row_item.address.block() if defined("row_item.address") else ""
  - Email: |
      row_item.email if defined("row_item.email") else ""
edit:
  - name.first
  - address.address
  - email
confirm: True
---
template: appellee_brief_email_template
subject: |
  Appellee's informal brief documents
content: |
  Attached are ${ users[0] }'s informal brief documents.

  Be sure to review the attached documents before filing or serving them.
---
id: download appellee_brief
event: informal_appellee_brief_form_download
question: |
  Almost done
subquestion: |
  ${users[0]}, Your form is ready to download and deliver. You can view and download your documents below. Follow the downloadable instruction. There you will find next steps, including how to [eFile your appeal](https://massachusetts.tylertech.cloud/OfsWeb). Should you need to edit anything, you can click the "Edit answers" button to edit your answers.  ${ action_button_html(url_action('review_appellee_brief'), label='Edit answers', color='info') }

  Alternativly, you can email yourself an editable copy (Word doc) of your brief by clicking *Include an editable copy* under *Get a copy of the documents in email* and hitting *Send* to email a copy to yourself.

  ${ al_user_bundle.download_list_html() }
  
  ${ al_user_bundle.send_button_html(
    show_editable_checkbox=True,
    template_name="appellee_brief_email_template"
  ) }

progress: 100
always include editable files: True
